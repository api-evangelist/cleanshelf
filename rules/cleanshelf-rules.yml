extends:
  - spectral:oas
rules:
  cleanshelf-info-contact:
    description: API info MUST contain a contact email or URL.
    severity: warn
    given: $.info
    then:
      field: contact
      function: truthy
  cleanshelf-https-only:
    description: All Zylo (Cleanshelf successor) API servers MUST use HTTPS.
    severity: error
    given: $.servers[*].url
    then:
      function: pattern
      functionOptions:
        match: '^https://'
  cleanshelf-operation-id:
    description: Operations MUST have an operationId.
    severity: error
    given: $.paths[*][get,post,put,delete,patch]
    then:
      field: operationId
      function: truthy
  cleanshelf-tag-required:
    description: Operations MUST be tagged for SaaS-management domain grouping.
    severity: warn
    given: $.paths[*][get,post,put,delete,patch].tags
    then:
      function: truthy
  cleanshelf-security-required:
    description: API MUST define API key or bearer token security schemes.
    severity: error
    given: $.components.securitySchemes
    then:
      function: truthy
  cleanshelf-server-url:
    description: API MUST declare at least one server URL.
    severity: error
    given: $.servers
    then:
      function: truthy
